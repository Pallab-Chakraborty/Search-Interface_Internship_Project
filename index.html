<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSearch — Advanced Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ── TOKENS ──────────────────────────────────────────── */
    :root {
      --bg:        #08090f;
      --bg2:       #0f1018;
      --bg3:       #181a27;
      --surface:   #1c1e2e;
      --surface2:  #242638;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #e8eaf6;
      --text2:     #8b8fa8;
      --text3:     #555875;
      --cyan:      #3dd9eb;
      --cyan2:     #a8f0f8;
      --violet:    #7c5cfc;
      --violet2:   #b09fff;
      --glow-c:    rgba(61,217,235,0.18);
      --glow-v:    rgba(124,92,252,0.18);
      --radius:    16px;
      --radius-sm: 10px;
      --trans:     0.22s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="light"] {
      --bg:        #f0f2ff;
      --bg2:       #e8eaf6;
      --bg3:       #dde0f5;
      --surface:   #ffffff;
      --surface2:  #f4f5ff;
      --border:    rgba(0,0,0,0.07);
      --border2:   rgba(0,0,0,0.13);
      --text:      #12131f;
      --text2:     #4a4d66;
      --text3:     #9094b0;
      --glow-c:    rgba(61,217,235,0.12);
      --glow-v:    rgba(124,92,252,0.12);
    }

    /* ── BASE ────────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; list-style:none; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* ── ANIMATED MESH BACKGROUND ────────────────────────── */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 900px; height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,252,0.13) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: floatA 18s ease-in-out infinite;
    }
    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61,217,235,0.11) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: floatB 22s ease-in-out infinite;
    }
    .mesh-blob3 {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,100,180,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: floatC 28s ease-in-out infinite;
    }
    @keyframes floatA { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(80px,60px) scale(1.12)} }
    @keyframes floatB { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-60px,-80px) scale(1.1)} }
    @keyframes floatC { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(calc(-50% + 40px),calc(-50% - 30px)) scale(1.15)} }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
      transition: padding-top 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .page.has-results { padding-top: 40px; }
    .page:not(.has-results) { justify-content: center; }

    /* ── TOP BAR ─────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: rgba(8,9,15,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s;
    }
    [data-theme="light"] .topbar { background: rgba(240,242,255,0.75); }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo span { opacity: 0.55; -webkit-text-fill-color: var(--text2); background: none; font-weight: 400; font-size: 0.75rem; letter-spacing: 2px; margin-left: 4px; vertical-align: middle; }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .theme-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--trans);
    }
    .theme-btn:hover { background: var(--surface2); color: var(--cyan); border-color: var(--cyan); }

    /* ── HERO SECTION ────────────────────────────────────── */
    .hero {
      text-align: center;
      margin-bottom: 36px;
      animation: heroIn 0.8s ease both;
    }
    @keyframes heroIn {
      from { opacity:0; transform: translateY(-20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--cyan); font-weight: 600;
      margin-bottom: 16px;
      padding: 5px 14px;
      background: rgba(61,217,235,0.08);
      border: 1px solid rgba(61,217,235,0.2);
      border-radius: 20px;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 14px;
    }
    .hero-title .accent {
      background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1rem;
      color: var(--text2);
      font-weight: 400;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── SEARCH CORE ─────────────────────────────────────── */
    .search-core {
      width: 100%;
      max-width: 780px;
      position: relative;
      animation: heroIn 0.8s ease 0.15s both;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 50px;
      box-shadow: 0 0 0 0 var(--glow-c);
      transition: border-color var(--trans), box-shadow var(--trans), background var(--trans);
      overflow: visible;
      position: relative;
    }
    .search-wrap.focused {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px var(--glow-c), 0 20px 60px rgba(0,0,0,0.25);
    }

    /* Category pill */
    .cat-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 0 18px;
      height: 56px;
      background: linear-gradient(135deg, var(--violet) 0%, #5c3fd8 100%);
      border-radius: 50px 0 0 50px;
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all var(--trans);
      white-space: nowrap;
      min-width: 140px;
      justify-content: space-between;
    }
    .cat-btn:hover { filter: brightness(1.15); }
    .cat-btn i.chevron {
      font-size: 0.65rem;
      transition: transform var(--trans);
    }
    .cat-btn.open i.chevron { transform: rotate(180deg); }

    .divider-line {
      width: 1px; height: 26px;
      background: var(--border2);
      flex-shrink: 0;
    }

    /* Input */
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 14px 0 18px;
      gap: 10px;
    }
    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      outline: none;
      height: 56px;
      caret-color: var(--cyan);
    }
    .search-input::placeholder { color: var(--text3); }

    /* Voice btn */
    .voice-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .voice-btn:hover { background: rgba(61,217,235,0.1); color: var(--cyan); border-color: var(--cyan); }
    .voice-btn.listening { background: rgba(255,60,60,0.12); color: #ff4444; border-color: #ff4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,60,60,0.3)} 50%{box-shadow:0 0 0 8px rgba(255,60,60,0)} }

    /* Clear btn */
    .clear-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text2);
      font-size: 0.7rem;
      cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .clear-btn.visible { display: flex; }
    .clear-btn:hover { background: rgba(255,80,80,0.15); color: #ff6060; }

    /* Search button */
    .search-btn {
      flex-shrink: 0;
      width: 56px; height: 56px;
      border-radius: 0 50px 50px 0;
      background: linear-gradient(135deg, var(--cyan) 0%, #1ab8cc 100%);
      border: none;
      color: #08090f;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--trans);
    }
    .search-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
    .search-btn:active { transform: scale(0.97); }

    /* ── DROPDOWN ────────────────────────────────────────── */
    .cat-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      z-index: 200;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .cat-dropdown.open { opacity:1; transform:translateY(0) scale(1); pointer-events:all; }

    .cat-dropdown-header {
      padding: 12px 16px 8px;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 600;
    }

    .cat-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background var(--trans);
      font-size: 0.87rem;
      font-weight: 500;
      color: var(--text2);
    }
    .cat-item:hover, .cat-item.active { background: var(--surface2); color: var(--text); }
    .cat-item.active { color: var(--violet2); }
    .cat-item .cat-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .cat-item .cat-count {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text3);
      background: var(--bg3);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── SUGGESTIONS PANEL ───────────────────────────────── */
    .suggestions-panel {
      position: absolute;
      top: calc(100% + 10px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      z-index: 150;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-height: 520px;
      overflow-y: auto;
    }
    .suggestions-panel.open { opacity:1; transform:translateY(0); pointer-events:all; }

    .suggestions-panel::-webkit-scrollbar { width: 4px; }
    .suggestions-panel::-webkit-scrollbar-track { background: transparent; }
    .suggestions-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .panel-section { padding: 14px 0 6px; }
    .panel-section + .panel-section { border-top: 1px solid var(--border); }

    .panel-label {
      display: flex; align-items: center; gap: 7px;
      padding: 0 18px 8px;
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 600;
    }
    .panel-label i { font-size: 0.7rem; }

    .suggestion-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background var(--trans);
    }
    .suggestion-item:hover, .suggestion-item.kbd-focus {
      background: var(--surface2);
    }
    .suggestion-item .s-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: var(--text2);
      flex-shrink: 0;
    }
    .suggestion-item .s-text { flex: 1; }
    .suggestion-item .s-main {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }
    .suggestion-item .s-main mark {
      background: none;
      color: var(--cyan);
      font-weight: 600;
    }
    .suggestion-item .s-sub {
      font-size: 0.73rem;
      color: var(--text3);
      margin-top: 1px;
    }
    .suggestion-item .s-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Trending tags */
    .trending-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 4px 18px 14px;
    }
    .trend-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      transition: all var(--trans);
    }
    .trend-tag:hover { background: var(--surface2); color: var(--text); border-color: var(--cyan); }
    .trend-tag i { font-size: 0.65rem; color: var(--cyan); }

    /* Keyboard hint */
    .kbd-hint-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--text3);
    }
    .kbd-hint-bar .kh-item { display: flex; align-items: center; gap: 5px; }
    .kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 18px; padding: 0 4px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; font-size: 0.6rem; color: var(--text2); }

    /* ── FILTER CHIPS ────────────────────────────────────── */
    .filter-row {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
      animation: heroIn 0.6s ease 0.25s both;
    }

    .filter-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      transition: all var(--trans);
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--violet); color: var(--violet2); background: rgba(124,92,252,0.08); }
    .filter-chip.active { background: rgba(124,92,252,0.15); border-color: var(--violet); color: var(--violet2); }
    .filter-chip i { font-size: 0.72rem; }

    .filter-chip.special {
      background: linear-gradient(135deg, rgba(61,217,235,0.12), rgba(124,92,252,0.12));
      border-color: rgba(61,217,235,0.3);
      color: var(--cyan2);
    }

    /* ── STATS BAR ───────────────────────────────────────── */
    .stats-bar {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      padding: 0 4px;
      font-size: 0.78rem;
      color: var(--text3);
      animation: fadeUp 0.4s ease both;
    }
    .stats-count { color: var(--text2); }
    .stats-count strong { color: var(--cyan); }
    .stats-sort { display: flex; align-items: center; gap: 8px; }
    .sort-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all var(--trans);
    }
    .sort-btn.active { border-color: var(--violet); color: var(--violet2); background: rgba(124,92,252,0.1); }
    .sort-btn:hover { border-color: var(--violet); color: var(--violet2); }

    /* ── RESULTS ─────────────────────────────────────────── */
    .results-wrap {
      width: 100%;
      max-width: 780px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      cursor: pointer;
      transition: all var(--trans);
      animation: fadeUp 0.4s ease both;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .result-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .result-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .result-body { flex: 1; min-width: 0; }

    .result-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .result-source {
      font-size: 0.68rem;
      letter-spacing: 0.5px;
      color: var(--text3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .result-badge {
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.35;
    }
    .result-title mark { background: none; color: var(--cyan); }

    .result-desc {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-meta {
      display: flex; align-items: center; gap: 14px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .result-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem;
      color: var(--text3);
    }
    .result-tag i { font-size: 0.65rem; }
    .result-action {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text3);
      font-size: 0.72rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--trans);
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }
    .icon-btn.liked { color: #ff6b9d; border-color: #ff6b9d; background: rgba(255,107,157,0.1); }

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function showToast(msg, icon = 'fa-solid fa-check-circle', color = 'var(--cyan)') {
  toastMsg.textContent = msg;
  toast.querySelector('i').className = icon;
  toast.querySelector('i').style.color = color;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

      state.history.slice(0, 4).forEach(h => {
        html += `<div class="suggestion-item" data-val="${h}">
          <div class="s-icon" style="color:var(--text3)"><i class="fa-solid fa-clock-rotate-left"></i></div>
          <div class="s-text"><div class="s-main">${h}</div></div>
          <span class="s-badge" style="background:var(--bg3);color:var(--text3)">History</span>
        </div>`;
      });
      html += '</div>';
    }
    html += `<div class="panel-section"><div class="panel-label"><i class="fa-solid fa-fire"></i>Trending Now</div>
      <div class="trending-tags">
        ${TRENDING.map(t => `<span class="trend-tag" data-val="${t}"><i class="fa-solid fa-arrow-trend-up"></i>${t}</span>`).join('')}
      </div></div>`;
    html += `<div class="kbd-hint-bar">
      <div class="kh-item"><kbd class="kbd">↑↓</kbd> Navigate</div>
      <div class="kh-item"><kbd class="kbd">↵</kbd> Select</div>
      <div class="kh-item"><kbd class="kbd">Esc</kbd> Close</div>
    </div>`;
    suggestPanel.innerHTML = html;
    bindSuggestClicks();
    suggestPanel.classList.add('open');
    return;
  }

  const matches = getSuggestions(q);
  if (!matches) { suggestPanel.classList.remove('open'); return; }

  let html = `<div class="panel-section"><div class="panel-label"><i class="fa-solid fa-magnifying-glass"></i>Suggestions</div>`;
  matches.forEach(m => {
    html += `<div class="suggestion-item" data-val="${m}">
      <div class="s-icon"><i class="fa-solid fa-magnifying-glass" style="color:var(--cyan)"></i></div>
      <div class="s-text"><div class="s-main">${highlight(m, q)}</div></div>
    </div>`;
  });
  html += '</div>';
  html += `<div class="kbd-hint-bar">
    <div class="kh-item"><kbd class="kbd">↑↓</kbd> Navigate</div>
    <div class="kh-item"><kbd class="kbd">↵</kbd> Select</div>
    <div class="kh-item"><kbd class="kbd">Esc</kbd> Close</div>
  </div>`;
  suggestPanel.innerHTML = html;
  bindSuggestClicks();
  suggestPanel.classList.add('open');
}

function bindSuggestClicks() {
  suggestPanel.querySelectorAll('[data-val]').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const val = el.dataset.val;
      searchInput.value = val;
      state.query = val;
      updateClear();
      closeSuggest();
      triggerSearch();
    });
  });
}

function closeSuggest() {
  suggestPanel.classList.remove('open');
  kbdIndex = -1;
}

// Keyboard navigation in suggestions
searchInput.addEventListener('keydown', e => {
  const items = [...suggestPanel.querySelectorAll('.suggestion-item')];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    kbdIndex = Math.min(kbdIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('kbd-focus', i === kbdIndex));
    if (items[kbdIndex]) searchInput.value = items[kbdIndex].dataset.val || '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    kbdIndex = Math.max(kbdIndex - 1, -1);
    items.forEach((el, i) => el.classList.toggle('kbd-focus', i === kbdIndex));
    if (kbdIndex === -1) searchInput.value = state.query;
    else if (items[kbdIndex]) searchInput.value = items[kbdIndex].dataset.val || '';
  } else if (e.key === 'Escape') {
    closeSuggest();
    closeCatDropdown();
  } else if (e.key === 'Enter') {
    if (kbdIndex >= 0 && items[kbdIndex]) {
      searchInput.value = items[kbdIndex].dataset.val || '';
    }
    triggerSearch();
    closeSuggest();
  }
});

// ═══════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════
let debounceTimer;

searchInput.addEventListener('input', () => {
  state.query = searchInput.value;
  updateClear();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderSuggest, 120);
});

searchInput.addEventListener('focus', () => {
  searchWrap.classList.add('focused');
  closeCatDropdown();
  renderSuggest();
});

searchInput.addEventListener('blur', () => {
  searchWrap.classList.remove('focused');
  setTimeout(closeSuggest, 200);
});

function updateClear() {
  clearBtn.classList.toggle('visible', !!searchInput.value);
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  updateClear();
  searchInput.focus();
  renderSuggest();
});

// ═══════════════════════════════════════════════════
// VOICE SEARCH
// ═══════════════════════════════════════════════════
voiceBtn.addEventListener('click', () => {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice search not supported in this browser', 'fa-solid fa-triangle-exclamation', '#f5c542');
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SpeechRecognition();
  rec.lang = 'en-US'; rec.interimResults = true;
  voiceBtn.classList.add('listening');
  voiceIcon.className = 'fa-solid fa-circle-dot';
  showToast('Listening… Speak now', 'fa-solid fa-microphone', '#ff4444');

  rec.onresult = e => {
    const transcript = e.results[0][0].transcript;
    searchInput.value = transcript;
    state.query = transcript;
    updateClear();
  };
  rec.onend = () => {
    voiceBtn.classList.remove('listening');
    voiceIcon.className = 'fa-solid fa-microphone';
    if (state.query) triggerSearch();
  };
  rec.onerror = () => {
    voiceBtn.classList.remove('listening');
    voiceIcon.className = 'fa-solid fa-microphone';
    showToast('Voice search cancelled', 'fa-solid fa-xmark', 'var(--text3)');
  };
  rec.start();
});

// ═══════════════════════════════════════════════════
// SEARCH EXECUTION
// ═══════════════════════════════════════════════════
$('search-btn').addEventListener('click', triggerSearch);

function triggerSearch() {
  state.query = searchInput.value.trim();
  if (!state.query) { searchInput.focus(); return; }
  state.page = 1;
  closeSuggest();
  closeCatDropdown();
  saveHistory(state.query);
  runSearch();
}

function runSearch() {
  state.hasSearched = true;
  state.loading = true;
  showLoading();
  enterResultsMode();

  setTimeout(() => {
    const q = state.query.toLowerCase();
    const catId = state.category;

    let results = RESULT_DATA.filter(r => {
      const matchQ = !q ||
        r.title.toLowerCase().includes(q) ||
        r.desc.toLowerCase().includes(q) ||
        r.source.toLowerCase().includes(q) ||
        r.tags.some(t => t.text.toLowerCase().includes(q));
      const matchCat = catId === 'everything' || r.cat === catId;
      const matchRemote = !state.filters.has('remote') || r.tags.some(t => t.text.toLowerCase().includes('remote'));
      const matchFull = !state.filters.has('fulltime') || r.tags.some(t => t.text.toLowerCase().includes('full-time') || t.text.toLowerCase().includes('full time'));
      const matchContract = !state.filters.has('contract') || (r.badge === 'CONTRACT' || r.tags.some(t => t.text.toLowerCase().includes('contract')));
      const matchSenior = !state.filters.has('senior') || r.title.toLowerCase().includes('senior');
      return matchQ && matchCat && matchRemote && matchFull && matchContract && matchSenior;
    });

    if (state.sortBy === 'views') results.sort((a,b) => parseInt(b.meta.views) - parseInt(a.meta.views));

    state.results = results;
    state.loading = false;
    renderResults();
    renderStats();
    renderPagination();
    renderRecent();
  }, 650);
}

// ═══════════════════════════════════════════════════
// LAYOUT MODE
// ═══════════════════════════════════════════════════
function enterResultsMode() {
  page.classList.add('has-results');
  heroBlock.style.cssText = 'margin-bottom:16px;';
  heroBlock.querySelector('.hero-title').style.fontSize = '1.6rem';
  heroBlock.querySelector('.hero-title').style.letterSpacing = '-1px';
  heroBlock.querySelector('.hero-title').style.marginBottom = '0';
  heroBlock.querySelector('.hero-eyebrow').style.display = 'none';
  heroBlock.querySelector('.hero-sub').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// LOADING SKELETONS
// ═══════════════════════════════════════════════════
function showLoading() {
  resultsWrap.innerHTML = Array(4).fill(0).map((_,i) => `
    <div class="skeleton-card" style="animation-delay:${i*0.07}s">
      <div class="skel skel-icon"></div>
      <div class="skel-body">
        <div class="skel skel-line w30"></div>
        <div class="skel skel-line w75"></div>
        <div class="skel skel-line w90"></div>
        <div class="skel skel-line w60"></div>
      </div>
    </div>`).join('');
  statsBar.style.display = 'none';
  pagination.style.display = 'none';
}

// ═══════════════════════════════════════════════════
// RENDER RESULTS
// ═══════════════════════════════════════════════════
function renderResults() {
  const q = state.query;
  resultsWrap.innerHTML = '';

  if (!state.results.length) {
    resultsWrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="empty-title">No results for "${q}"</div>
        <div class="empty-sub">Try a different keyword, category, or remove some filters.</div>
      </div>`;
    return;
  }

  const PER_PAGE = 5;
  const start = (state.page - 1) * PER_PAGE;
  const paged = state.results.slice(start, start + PER_PAGE);

  paged.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${i * 0.07}s`;
    const isLiked = state.liked.has(r.title);

    card.innerHTML = `
      <div class="result-icon" style="background:${r.iconBg};color:${r.iconColor}">
        <i class="${r.icon}"></i>
      </div>
      <div class="result-body">
        <div class="result-top">
          <span class="result-source">${r.source}</span>
          ${r.badge ? `<span class="result-badge" style="background:${r.badgeBg};color:${r.badgeColor}">${r.badge}</span>` : ''}
        </div>
        <div class="result-title">${highlight(r.title, q)}</div>
        <div class="result-desc">${r.desc}</div>
        <div class="result-meta">
          ${r.tags.map(t => `<span class="result-tag"><i class="${t.icon}"></i>${t.text}</span>`).join('')}
          <div class="result-action">
            <button class="icon-btn" title="Views"><i class="fa-solid fa-eye"></i> ${r.meta.views}</button>
            <button class="icon-btn ${isLiked ? 'liked' : ''} like-btn" title="Save"><i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i></button>
            <button class="icon-btn share-btn" title="Share"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
          </div>
        </div>
      </div>`;

    // Like
    card.querySelector('.like-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (state.liked.has(r.title)) {
        state.liked.delete(r.title);
        showToast('Removed from saved', 'fa-regular fa-heart', 'var(--text2)');
      } else {
        state.liked.add(r.title);
        showToast('Saved!', 'fa-solid fa-heart', '#ff6b9d');
      }
      renderResults();
    });

    // Share
    card.querySelector('.share-btn').addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard?.writeText(r.title).then(() => {
        showToast('Copied to clipboard!', 'fa-solid fa-copy');
      }).catch(() => {
        showToast('Link copied!', 'fa-solid fa-copy');
      });
    });

    resultsWrap.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════════════════
function renderStats() {
  const total = state.results.length;
  statsBar.style.display = 'flex';
  statsBar.innerHTML = `
    <div class="stats-count">Found <strong>${total}</strong> result${total !== 1 ? 's' : ''} for "<strong style="color:var(--text)">${state.query}</strong>"</div>
    <div class="stats-sort">
      Sort:
      <button class="sort-btn ${state.sortBy==='relevance'?'active':''}" id="sort-rel">Relevance</button>
      <button class="sort-btn ${state.sortBy==='views'?'active':''}" id="sort-views">Most Viewed</button>
    </div>`;

  statsBar.querySelector('#sort-rel').addEventListener('click', () => { state.sortBy='relevance'; state.page=1; renderStats(); renderResults(); renderPagination(); });
  statsBar.querySelector('#sort-views').addEventListener('click', () => { state.sortBy='views'; state.page=1; runSearch(); });
}

// ═══════════════════════════════════════════════════
// PAGINATION
// ═══════════════════════════════════════════════════
function renderPagination() {
  const PER_PAGE = 5;
  const totalPages = Math.ceil(state.results.length / PER_PAGE);
  if (totalPages <= 1) { pagination.style.display = 'none'; return; }

  pagination.style.display = 'flex';
  pagination.innerHTML = '';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'page-btn';
  prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
  prevBtn.disabled = state.page === 1;
  prevBtn.addEventListener('click', () => { state.page--; renderResults(); renderPagination(); window.scrollTo({top: 0, behavior:'smooth'}); });
  pagination.appendChild(prevBtn);

  for (let p = 1; p <= totalPages; p++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (p === state.page ? ' active' : '');
    btn.textContent = p;
    btn.addEventListener('click', () => { state.page = p; renderResults(); renderPagination(); window.scrollTo({top: 0, behavior:'smooth'}); });
    pagination.appendChild(btn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.className = 'page-btn';
  nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
  nextBtn.disabled = state.page === totalPages;
  nextBtn.addEventListener('click', () => { state.page++; renderResults(); renderPagination(); window.scrollTo({top: 0, behavior:'smooth'}); });
  pagination.appendChild(nextBtn);
}

// ═══════════════════════════════════════════════════
// CLICK OUTSIDE
// ═══════════════════════════════════════════════════
document.addEventListener('click', e => {
  if (!e.target.closest('#cat-btn') && !e.target.closest('#cat-dropdown')) closeCatDropdown();
});

// ═══════════════════════════════════════════════════
// GLOBAL KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    showToast('/ to focus search', 'fa-solid fa-keyboard');
  }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderFilters();
renderRecent();

// Press / hint
setTimeout(() => {
  if (!state.hasSearched) showToast('Press / to focus search', 'fa-solid fa-keyboard', 'var(--violet2)');
}, 2000);
</script>
</body>
</html>
